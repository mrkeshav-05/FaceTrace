# docker-compose.prod.yml — Production Mode
# Usage: docker compose -f docker-compose.prod.yml up --build -d

services:
  # ---------- MongoDB ----------
  mongodb:
    image: mongo:7
    container_name: absens-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: always
    # No ports exposed to host in production — only accessible within Docker network

  # ---------- Node.js Backend ----------
  backend:
    build:
      context: ./Backend
      target: production
    container_name: absens-backend
    ports:
      - "4000:4000"
    env_file:
      - ./Backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/absens
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    restart: always

  # ---------- Next.js Frontend ----------
  frontend:
    build:
      context: ./Frontend
      target: production
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:4000/api/v1
        NEXT_PUBLIC_IMAGE_RECOGNITION_URL: http://localhost:8000
    container_name: absens-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: always

  # ---------- Python Image Matching Backend ----------
  image-matching:
    build:
      context: ./Image_matching_backend
      target: production
    container_name: absens-image-matching
    ports:
      - "8000:8000"
    env_file:
      - ./Image_matching_backend/.env
    restart: always

volumes:
  mongodb_data:
